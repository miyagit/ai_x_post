name: Post to X

on:
  schedule:
    # JST 8:00, 12:30, 19:00 (UTC-9 → 23:00, 03:30, 10:00)
    - cron: "0 23 * * *"
    - cron: "30 3 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual post)"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --frozen

      - name: Run post job
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          AI_X_POST_DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: uv run ai-x-post
